<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>선수 CSV 한줄 생성기 v3</title>
<style>
body{font-family:Arial,"Noto Sans KR",sans-serif;background:#111827;color:#e5e7eb;margin:0;padding:24px}
.wrap{max-width:1200px;margin:auto}.card{background:#1f2937;border:1px solid #374151;border-radius:14px;padding:18px;margin:14px 0}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}label{font-size:12px;color:#cbd5e1}
input,select,textarea{width:100%;box-sizing:border-box;background:#0b1220;color:#e5e7eb;border:1px solid #475569;border-radius:8px;padding:10px;margin-top:5px}
textarea{height:110px;font-family:Consolas,monospace}button{background:#2563eb;color:white;border:0;border-radius:10px;padding:12px 16px;font-weight:700;cursor:pointer;margin-right:8px}
button.secondary{background:#374151}.badge{display:inline-block;background:#0f172a;border:1px solid #334155;border-radius:999px;padding:4px 10px;margin:2px;color:#cbd5e1;cursor:pointer}
.rec{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.recitem{background:#0b1220;border:1px solid #334155;border-radius:10px;padding:10px}
.bar{height:8px;background:#334155;border-radius:999px;overflow:hidden;margin-top:6px}.fill{height:100%;background:#22c55e}.small{font-size:12px;color:#94a3b8}
@media(max-width:900px){.grid,.rec{grid-template-columns:repeat(2,1fr)}}
</style></head><body><div class="wrap">
<h1>축구 매니저 선수 CSV 한줄 생성기 v3</h1>
<p>v3: 추천 키포지션 TOP5 자동 계산. 요구능력 수치 없이 키포지션 궁합으로 전략성을 만든다.</p>
<div class="card"><div class="grid">
<div><label>실명</label><input id="name" placeholder="예: 손흥민"></div><div><label>가명</label><input id="fake" placeholder="비워두면 자동 생성"></div>
<div><label>상세 포지션</label><select id="position"><option>LW/ST</option><option>ST</option><option>RW/LW</option><option>AM/RW</option><option>CM/DM</option><option>CM</option><option>DM/CM</option><option>CB</option><option>LB</option><option>RB</option><option>GK</option></select></div>
<div><label>심플 포지션</label><select id="simple_position"><option>fw</option><option>mf</option><option>df</option><option>gk</option></select></div>
<div><label>랭크 1~5</label><select id="rank"><option>3</option><option>1</option><option>2</option><option>4</option><option>5</option></select></div>
<div><label>전성기 기수</label><select id="age"><option>5</option><option>4</option><option>6</option><option>3</option><option>7</option><option>2</option><option>8</option><option>1</option><option>9</option><option>10</option></select></div>
<div><label>키</label><input id="height" value="180"></div><div><label>몸무게</label><input id="weight" value="75"></div>
<div><label>스피드 0~10</label><input id="speed" value="7"></div><div><label>파워 0~10</label><input id="power" value="7"></div><div><label>기술 0~10</label><input id="tech" value="7"></div><div><label>슈팅 0~10</label><input id="shooting" value="6"></div>
<div><label>패스 0~10</label><input id="passing" value="6"></div><div><label>수비 0~10</label><input id="defense" value="5"></div><div><label>활동량 0~10</label><input id="stamina" value="6"></div><div><label>GK 0~10</label><input id="goalkeeper" value="0"></div>
<div><label>PK/FK/CK 0~10</label><input id="setpiece" value="5,5,5"></div><div><label>리더십 0~10</label><input id="leadership" value="5"></div><div><label>지성↔감각 0~10</label><input id="intel" value="5"></div><div><label>개인↔조직 0~10</label><input id="org" value="5"></div>
<div><label>국적</label><input id="nation" value="대한민국"></div><div><label>portrait_url</label><input id="portrait"></div>
</div><br><button onclick="generate()">CSV 한 줄 생성</button><button class="secondary" onclick="copyOut()">복사</button><button class="secondary" onclick="fillPreset()">프리셋 찾기</button></div>
<div class="card"><h3>추천 키포지션 TOP 5</h3><div id="recommend" class="rec"></div></div>
<div class="card"><div class="small">헤더</div><textarea id="header" readonly></textarea><div class="small">CSV 한 줄</div><textarea id="out" readonly></textarea></div>
<div class="card"><div>프리셋 선수</div><div id="presets"></div></div>
</div>
<script>
const keyPositions=[{"id": "kp_poacher", "name": "포처", "simple": "fw", "main": "shooting", "sub": "speed", "mental": "sense", "team": "individual", "desc": "수비 뒷공간을 파고드는 마무리형 공격수"}, {"id": "kp_target_forward", "name": "타겟 포워드", "simple": "fw", "main": "power", "sub": "shooting", "mental": "sense", "team": "organization", "desc": "몸싸움과 제공권으로 공격의 기준점이 되는 공격수"}, {"id": "kp_false_nine", "name": "펄스 나인", "simple": "fw", "main": "technique", "sub": "passing", "mental": "intelligence", "team": "organization", "desc": "전방에서 내려와 패스와 연계로 공간을 만드는 공격수"}, {"id": "kp_wing_forward_l", "name": "왼쪽 윙포워드", "simple": "fw", "main": "speed", "sub": "technique", "mental": "sense", "team": "individual", "desc": "측면 돌파와 컷인 슈팅에 강한 공격수"}, {"id": "kp_wing_forward_r", "name": "오른쪽 윙포워드", "simple": "fw", "main": "speed", "sub": "technique", "mental": "sense", "team": "individual", "desc": "오른쪽 측면에서 돌파와 찬스메이킹을 담당"}, {"id": "kp_playmaker", "name": "플레이메이커", "simple": "mf", "main": "technique", "sub": "passing", "mental": "intelligence", "team": "organization", "desc": "중앙에서 패스와 템포를 조율하는 미드필더"}, {"id": "kp_trequartista", "name": "트레콰르티스타", "simple": "mf", "main": "technique", "sub": "shooting", "mental": "sense", "team": "individual", "desc": "공격수와 미드필더 사이에서 결정적 장면을 만드는 선수"}, {"id": "kp_box_to_box", "name": "박스 투 박스", "simple": "mf", "main": "stamina", "sub": "power", "mental": "intelligence", "team": "organization", "desc": "공수 양면을 왕복하며 압박과 전개를 담당"}, {"id": "kp_anchor", "name": "앵커맨", "simple": "mf", "main": "defense", "sub": "power", "mental": "intelligence", "team": "organization", "desc": "수비라인 앞에서 위험 지역을 차단하는 미드필더"}, {"id": "kp_wingback_l", "name": "왼쪽 윙백", "simple": "df", "main": "stamina", "sub": "speed", "mental": "intelligence", "team": "organization", "desc": "측면 전진과 수비 복귀를 모두 수행"}, {"id": "kp_wingback_r", "name": "오른쪽 윙백", "simple": "df", "main": "stamina", "sub": "speed", "mental": "intelligence", "team": "organization", "desc": "오른쪽 측면 왕복과 크로스를 담당"}, {"id": "kp_center_back", "name": "센터백", "simple": "df", "main": "defense", "sub": "power", "mental": "intelligence", "team": "organization", "desc": "수비의 중심에서 라인을 지휘하고 경합을 이김"}, {"id": "kp_sweeper", "name": "스위퍼", "simple": "df", "main": "defense", "sub": "technique", "mental": "intelligence", "team": "organization", "desc": "수비 뒷공간을 커버하고 빌드업에 관여"}, {"id": "kp_ball_playing_cb", "name": "빌드업 센터백", "simple": "df", "main": "defense", "sub": "passing", "mental": "intelligence", "team": "organization", "desc": "후방에서 정확한 패스로 공격을 시작"}, {"id": "kp_sweeper_keeper", "name": "스위퍼 키퍼", "simple": "gk", "main": "goalkeeper", "sub": "passing", "mental": "intelligence", "team": "organization", "desc": "골문 수비와 후방 빌드업을 함께 담당"}, {"id": "kp_shot_stopper", "name": "슈팅 스토퍼", "simple": "gk", "main": "goalkeeper", "sub": "power", "mental": "sense", "team": "individual", "desc": "반사신경과 선방 능력에 특화된 골키퍼"}];
const headers=["id","name","fake_name","position","simple_position","pos_1","pos_2","pos_3","pos_4","pos_5","pos_6","pos_7","pos_8","pos_9","pos_10","pos_11","pos_12","pos_13","rank","age_stage","height","weight","nationality",
...Array.from({length:10},(_,i)=>[`growth_${i+1}_speed`,`growth_${i+1}_power`,`growth_${i+1}_technique`]).flat(),
"speed","power","technique","shooting","passing","defense","stamina","goalkeeper","pk_ability","fk_ability","ck_ability","leadership","intelligence_sense","individual_organization","recommend_key_positions","portrait_url"];
const presets={
"손흥민":["손흥만","LW/ST","fw",5,5,183,78,9,8,9,9,7,4,8,0,"9,8,5",9,7,4],
"이강인":["이강이","AM/RW","mf",5,5,174,72,7,6,10,7,10,4,7,0,"7,9,8",6,8,4],
"김민재":["김민제","CB","df",5,5,190,88,7,9,7,4,6,10,8,0,"4,3,2",8,6,8],
"황희찬":["황희잔","LW/ST","fw",4,5,177,77,9,8,8,8,6,4,8,0,"5,4,3",6,6,5],
"조규성":["조규승","ST","fw",4,5,188,82,7,9,7,8,5,5,7,0,"7,4,2",7,6,6],
"조현우":["조현후","GK","gk",4,5,189,75,7,7,6,2,5,3,5,9,"6,5,3",8,7,6],
"황인범":["황인봄","CM/DM","mf",4,5,177,70,7,7,9,6,9,7,9,0,"5,7,6",7,8,7]
};
function clamp(v,min,max){return Math.max(min,Math.min(max,Number(v)||0))}
function fakeName(n){return presets[n]?.[0] || (n.length>=3?n.slice(0,-1)+"만":n+"군")}
function simpleFromPosition(p){p=p.toUpperCase();if(p.includes("GK"))return"gk";if(p.includes("CB")||p.includes("LB")||p.includes("RB"))return"df";if(p.includes("CM")||p.includes("DM")||p.includes("AM"))return"mf";return"fw"}
function posScores(position){let s=Array(13).fill(1);const set=(i,v)=>s[i-1]=Math.max(s[i-1],v);const p=position.toUpperCase();if(p.includes("GK"))set(13,7);if(p.includes("CB")){[10,11,12].forEach(i=>set(i,6));set(8,4);set(7,3);set(9,3)}if(p.includes("LB")){set(10,7);set(7,6);set(4,4);set(11,4)}if(p.includes("RB")){set(12,7);set(9,6);set(6,4);set(11,4)}if(p.includes("DM")){set(8,7);set(5,5);set(11,4);set(7,4);set(9,4)}if(p.includes("CM")){set(5,7);set(8,6);set(4,5);set(6,5)}if(p.includes("AM")){set(5,7);set(2,5);set(4,5);set(6,5)}if(p.includes("LW")){set(1,7);set(4,6);set(2,5);set(10,3)}if(p.includes("RW")){set(3,7);set(6,6);set(2,5);set(12,3)}if(p.includes("ST")||p.includes("CF")){set(2,7);set(1,5);set(3,5);set(5,4)}return s}
function getStats(){return {speed:clamp(speed.value,0,10),power:clamp(power.value,0,10),technique:clamp(tech.value,0,10),shooting:clamp(shooting.value,0,10),passing:clamp(passing.value,0,10),defense:clamp(defense.value,0,10),stamina:clamp(stamina.value,0,10),goalkeeper:clamp(goalkeeper.value,0,10),intel:clamp(intel.value,0,10),org:clamp(org.value,0,10),simple:simple_position.value}}
function scoreKP(k, st){let main=st[k.main]??0, sub=st[k.sub]??0;let pos=(k.simple===st.simple)?10:((k.simple==="mf"&&st.simple==="fw")||(k.simple==="fw"&&st.simple==="mf")||(k.simple==="df"&&st.simple==="mf")?6:2);let mental=k.mental==="intelligence"?(10-st.intel):st.intel;let team=k.team==="organization"?st.org:(10-st.org);let score=main*0.42+sub*0.23+pos*0.22+mental*0.07+team*0.06;return Math.round(score*10)}
function recommendKPs(){let st=getStats();return keyPositions.map(k=>({...k,score:scoreKP(k,st)})).sort((a,b)=>b.score-a.score).slice(0,5)}
function renderRecs(){let r=recommendKPs();recommend.innerHTML=r.map(x=>`<div class="recitem"><b>${x.name}</b> <span class="small">${x.simple}</span><br><span class="small">${x.desc}</span><div class="bar"><div class="fill" style="width:${x.score}%"></div></div><b>${x.score}%</b></div>`).join("")}
function growth(s,p,t,peak){let arr=[];peak=clamp(peak,1,10);for(let stage=1;stage<=10;stage++){let dist=Math.abs(stage-peak);let mult=Math.max(0.35,1-dist*0.12);if(stage>=peak+3)mult-=(stage-(peak+2))*0.04;arr.push(clamp(Math.round(s*mult),0,10),clamp(Math.round(p*mult),0,10),clamp(Math.round(t*mult),0,10));}return arr}
function esc(v){v=String(v??"");return /[,\"\n]/.test(v)?'"'+v.replaceAll('"','""')+'"':v}
function fillPreset(){const n=name.value.trim();if(!presets[n])return alert("프리셋 없음");const p=presets[n];fake.value=p[0];position.value=p[1];simple_position.value=p[2];rank.value=p[3];age.value=p[4];height.value=p[5];weight.value=p[6];speed.value=p[7];power.value=p[8];tech.value=p[9];shooting.value=p[10];passing.value=p[11];defense.value=p[12];stamina.value=p[13];goalkeeper.value=p[14];setpiece.value=p[15];leadership.value=p[16];intel.value=p[17];org.value=p[18];renderRecs()}
function generate(){const n=name.value.trim();if(!n)return alert("이름 입력");if(presets[n]&&!fake.value.trim())fillPreset();let sp=setpiece.value.split(",").map(x=>clamp(x.trim(),0,10));let recs=recommendKPs().map(x=>x.id+":"+x.score).join("|");let row=[Date.now(),n,fake.value.trim()||fakeName(n),position.value,simple_position.value,...posScores(position.value),clamp(rank.value,1,5),clamp(age.value,1,10),clamp(height.value,150,220),clamp(weight.value,45,120),nation.value||"대한민국",...growth(clamp(speed.value,0,10),clamp(power.value,0,10),clamp(tech.value,0,10),clamp(age.value,1,10)),clamp(speed.value,0,10),clamp(power.value,0,10),clamp(tech.value,0,10),clamp(shooting.value,0,10),clamp(passing.value,0,10),clamp(defense.value,0,10),clamp(stamina.value,0,10),clamp(goalkeeper.value,0,10),sp[0]??5,sp[1]??5,sp[2]??5,clamp(leadership.value,0,10),clamp(intel.value,0,10),clamp(org.value,0,10),recs,portrait.value.trim()];out.value=row.map(esc).join(",");renderRecs()}
function copyOut(){navigator.clipboard.writeText(out.value);alert("복사됨")}
document.querySelectorAll("input,select").forEach(e=>e.addEventListener("input",renderRecs));position.addEventListener("change",()=>{simple_position.value=simpleFromPosition(position.value);renderRecs()});
header.value=headers.join(",");presets.innerHTML=Object.keys(presets).map(n=>`<span class="badge" onclick="name.value='${n}';fillPreset();generate();">${n}</span>`).join("");renderRecs();
</script></body></html>
