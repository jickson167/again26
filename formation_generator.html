<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>포메이션 생성기</title>
<style>
body{font-family:Arial,"Noto Sans KR",sans-serif;background:#111827;color:#e5e7eb;padding:24px;margin:0}
.wrap{max-width:1200px;margin:auto}.card{background:#1f2937;border:1px solid #374151;border-radius:14px;padding:16px;margin:12px 0}
input,select,textarea{width:100%;box-sizing:border-box;background:#0b1220;color:#e5e7eb;border:1px solid #475569;border-radius:8px;padding:9px;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}button{background:#2563eb;color:white;border:0;border-radius:10px;padding:11px 15px;font-weight:bold;margin-right:8px}
textarea{height:130px;font-family:Consolas,monospace}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #374151;padding:8px;text-align:left}
.badge{display:inline-block;background:#0f172a;border:1px solid #334155;border-radius:999px;padding:4px 10px;margin:2px;cursor:pointer}.small{color:#94a3b8;font-size:12px}
.rec{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.recitem{background:#0b1220;border:1px solid #334155;border-radius:10px;padding:10px}.bar{height:8px;background:#334155;border-radius:99px;overflow:hidden}.fill{height:100%;background:#22c55e}
@media(max-width:900px){.grid,.rec{grid-template-columns:repeat(2,1fr)}}
</style></head><body><div class="wrap">
<h1>포메이션 생성기</h1><p>출시버전은 요구능력 없이 키포지션 3개만 둔다.</p>
<div class="card"><div class="grid">
<div><label>ID</label><input id="id" value="fm_new"></div><div><label>포메이션명</label><input id="name" value="4-3-3"></div>
<div><label>전술유형</label><select id="type"><option>밸런스</option><option>측면 공격</option><option>역습</option><option>점유/압박</option><option>중앙 장악</option><option>수비 안정</option><option>총공격</option></select></div>
<div><label>키포지션1</label><select id="k1"></select></div><div><label>키포지션2</label><select id="k2"></select></div><div><label>키포지션3</label><select id="k3"></select></div>
</div><label>코멘트</label><textarea id="comment">전술 설명</textarea><br><button onclick="gen()">CSV 한 줄 생성</button></div>
<div class="card"><textarea id="out" readonly></textarea></div><div class="card"><h3>출시 기본 포메이션 15개</h3><table id="tbl"></table></div>
</div><script>
const kps=[{"id": "kp_poacher", "name": "포처", "simple": "fw", "main": "shooting", "sub": "speed", "mental": "sense", "team": "individual", "desc": "수비 뒷공간을 파고드는 마무리형 공격수"}, {"id": "kp_target_forward", "name": "타겟 포워드", "simple": "fw", "main": "power", "sub": "shooting", "mental": "sense", "team": "organization", "desc": "몸싸움과 제공권으로 공격의 기준점이 되는 공격수"}, {"id": "kp_false_nine", "name": "펄스 나인", "simple": "fw", "main": "technique", "sub": "passing", "mental": "intelligence", "team": "organization", "desc": "전방에서 내려와 패스와 연계로 공간을 만드는 공격수"}, {"id": "kp_wing_forward_l", "name": "왼쪽 윙포워드", "simple": "fw", "main": "speed", "sub": "technique", "mental": "sense", "team": "individual", "desc": "측면 돌파와 컷인 슈팅에 강한 공격수"}, {"id": "kp_wing_forward_r", "name": "오른쪽 윙포워드", "simple": "fw", "main": "speed", "sub": "technique", "mental": "sense", "team": "individual", "desc": "오른쪽 측면에서 돌파와 찬스메이킹을 담당"}, {"id": "kp_playmaker", "name": "플레이메이커", "simple": "mf", "main": "technique", "sub": "passing", "mental": "intelligence", "team": "organization", "desc": "중앙에서 패스와 템포를 조율하는 미드필더"}, {"id": "kp_trequartista", "name": "트레콰르티스타", "simple": "mf", "main": "technique", "sub": "shooting", "mental": "sense", "team": "individual", "desc": "공격수와 미드필더 사이에서 결정적 장면을 만드는 선수"}, {"id": "kp_box_to_box", "name": "박스 투 박스", "simple": "mf", "main": "stamina", "sub": "power", "mental": "intelligence", "team": "organization", "desc": "공수 양면을 왕복하며 압박과 전개를 담당"}, {"id": "kp_anchor", "name": "앵커맨", "simple": "mf", "main": "defense", "sub": "power", "mental": "intelligence", "team": "organization", "desc": "수비라인 앞에서 위험 지역을 차단하는 미드필더"}, {"id": "kp_wingback_l", "name": "왼쪽 윙백", "simple": "df", "main": "stamina", "sub": "speed", "mental": "intelligence", "team": "organization", "desc": "측면 전진과 수비 복귀를 모두 수행"}, {"id": "kp_wingback_r", "name": "오른쪽 윙백", "simple": "df", "main": "stamina", "sub": "speed", "mental": "intelligence", "team": "organization", "desc": "오른쪽 측면 왕복과 크로스를 담당"}, {"id": "kp_center_back", "name": "센터백", "simple": "df", "main": "defense", "sub": "power", "mental": "intelligence", "team": "organization", "desc": "수비의 중심에서 라인을 지휘하고 경합을 이김"}, {"id": "kp_sweeper", "name": "스위퍼", "simple": "df", "main": "defense", "sub": "technique", "mental": "intelligence", "team": "organization", "desc": "수비 뒷공간을 커버하고 빌드업에 관여"}, {"id": "kp_ball_playing_cb", "name": "빌드업 센터백", "simple": "df", "main": "defense", "sub": "passing", "mental": "intelligence", "team": "organization", "desc": "후방에서 정확한 패스로 공격을 시작"}, {"id": "kp_sweeper_keeper", "name": "스위퍼 키퍼", "simple": "gk", "main": "goalkeeper", "sub": "passing", "mental": "intelligence", "team": "organization", "desc": "골문 수비와 후방 빌드업을 함께 담당"}, {"id": "kp_shot_stopper", "name": "슈팅 스토퍼", "simple": "gk", "main": "goalkeeper", "sub": "power", "mental": "sense", "team": "individual", "desc": "반사신경과 선방 능력에 특화된 골키퍼"}]; const fms=[{"id": "fm_442", "name": "4-4-2", "type": "밸런스", "key1": "kp_target_forward", "key2": "kp_box_to_box", "key3": "kp_center_back", "comment": "가장 기본적인 균형형 전술. 투톱과 두 줄 수비로 안정적인 운영이 가능하다."}, {"id": "fm_433", "name": "4-3-3", "type": "측면 공격", "key1": "kp_wing_forward_l", "key2": "kp_wing_forward_r", "key3": "kp_playmaker", "comment": "양쪽 윙포워드와 중앙 미드필더의 전개가 핵심인 공격형 전술."}, {"id": "fm_4231", "name": "4-2-3-1", "type": "점유/압박", "key1": "kp_trequartista", "key2": "kp_anchor", "key3": "kp_wing_forward_r", "comment": "공격형 미드필더를 중심으로 2선에서 찬스를 만드는 현대적인 전술."}, {"id": "fm_3412", "name": "3-4-1-2", "type": "역습", "key1": "kp_trequartista", "key2": "kp_target_forward", "key3": "kp_center_back", "comment": "중앙 밀집과 빠른 전환에 강한 전술. 수비 안정과 한방을 노린다."}, {"id": "fm_352", "name": "3-5-2", "type": "중앙 장악", "key1": "kp_wingback_l", "key2": "kp_wingback_r", "key3": "kp_box_to_box", "comment": "윙백의 활동량과 중원 숫자로 경기를 지배하는 전술."}, {"id": "fm_343", "name": "3-4-3", "type": "공격 전개", "key1": "kp_wing_forward_l", "key2": "kp_wing_forward_r", "key3": "kp_ball_playing_cb", "comment": "후방 빌드업과 측면 공격을 결합한 공격적인 3백 전술."}, {"id": "fm_4141", "name": "4-1-4-1", "type": "압박", "key1": "kp_anchor", "key2": "kp_box_to_box", "key3": "kp_wing_forward_l", "comment": "중원 압박과 안정적인 수비 밸런스를 중시하는 전술."}, {"id": "fm_451", "name": "4-5-1", "type": "수비 안정", "key1": "kp_anchor", "key2": "kp_playmaker", "key3": "kp_shot_stopper", "comment": "중원을 두텁게 세워 실점을 줄이고 역습을 노리는 전술."}, {"id": "fm_4312", "name": "4-3-1-2", "type": "중앙 돌파", "key1": "kp_trequartista", "key2": "kp_poacher", "key3": "kp_box_to_box", "comment": "중앙 공격형 미드필더와 투톱 조합으로 박스 근처를 공략."}, {"id": "fm_41212", "name": "4-1-2-1-2", "type": "다이아몬드", "key1": "kp_anchor", "key2": "kp_trequartista", "key3": "kp_target_forward", "comment": "측면보다 중앙 조합과 연계에 집중하는 전술."}, {"id": "fm_532", "name": "5-3-2", "type": "철벽 수비", "key1": "kp_sweeper", "key2": "kp_wingback_l", "key3": "kp_target_forward", "comment": "5백 안정성과 투톱 역습을 노리는 수비형 전술."}, {"id": "fm_541", "name": "5-4-1", "type": "잠그기", "key1": "kp_shot_stopper", "key2": "kp_center_back", "key3": "kp_wingback_r", "comment": "강팀을 상대로 실점을 최소화하는 극단적 안정형 전술."}, {"id": "fm_3241", "name": "3-2-4-1", "type": "공격 점유", "key1": "kp_false_nine", "key2": "kp_playmaker", "key3": "kp_ball_playing_cb", "comment": "후방부터 전진 배치해 점유율과 공격 숫자를 늘리는 전술."}, {"id": "fm_4222", "name": "4-2-2-2", "type": "빠른 전환", "key1": "kp_poacher", "key2": "kp_anchor", "key3": "kp_wing_forward_r", "comment": "좁은 2선과 투톱으로 빠르게 박스에 진입하는 전술."}, {"id": "fm_424", "name": "4-2-4", "type": "총공격", "key1": "kp_wing_forward_l", "key2": "kp_wing_forward_r", "key3": "kp_poacher", "comment": "득점이 필요할 때 전방 숫자를 극대화하는 공격형 전술."}];
function fill(s){s.innerHTML=kps.map(k=>`<option value="${k.id}">${k.name} (${k.simple})</option>`).join('')}
fill(k1);fill(k2);fill(k3);
function esc(v){v=String(v??'');return /[,\"\n]/.test(v)?'"'+v.replaceAll('"','""')+'"':v}
function gen(){out.value=[id.value,name.value,type.value,k1.value,k2.value,k3.value,comment.value].map(esc).join(',')}
function n(id){return kps.find(k=>k.id===id)?.name||id}
tbl.innerHTML='<tr><th>ID</th><th>포메이션</th><th>유형</th><th>키포지션</th></tr>'+fms.map(f=>`<tr><td>${f.id}</td><td>${f.name}</td><td>${f.type}</td><td>${n(f.key1)}, ${n(f.key2)}, ${n(f.key3)}</td></tr>`).join('');
</script></body></html>
