name: Deploy Flutter Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create build env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing Supabase secrets. Set SUPABASE_URL and SUPABASE_ANON_KEY in repository secrets."
            exit 1
          fi
          python3 - <<'PY'
          import json, os
          with open("env.json", "w", encoding="utf-8") as f:
              json.dump(
                  {
                      "SUPABASE_URL": os.environ["SUPABASE_URL"],
                      "SUPABASE_ANON_KEY": os.environ["SUPABASE_ANON_KEY"],
                  },
                  f,
              )
          PY

      - name: Build web
        run: |
          flutter build web --release \
            --base-href="/again26/" \
            --dart-define-from-file=env.json

      - name: Verify Supabase config embedded
        run: grep -q "supabase.co" build/web/main.dart.js

      - name: Add SPA fallback for GitHub Pages
        run: cp build/web/index.html build/web/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
