name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create web env.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing Supabase secrets."
            exit 1
          fi
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          cfg = {
              "SUPABASE_URL": os.environ["SUPABASE_URL"],
              "SUPABASE_ANON_KEY": os.environ["SUPABASE_ANON_KEY"],
          }
          text = "window.AGAIN26_CONFIG = " + json.dumps(cfg) + ";\n"
          Path("web/env.js").write_text(text, encoding="utf-8")
          PY

      - name: Build React web app
        run: |
          cd admin-web
          npm install
          npm run build

      - name: Bundle static tools and assets
        run: |
          mkdir -p build/web/tools
          cp player_row_generator_v3.html key_positions_v2.js build/web/tools/
          cp web/env.js build/web/env.js
          cp web/env.js build/web/tools/generator_config.js
          if [ -d web/player_images ]; then
            cp -r web/player_images build/web/player_images
          fi

      - name: Verify Supabase config
        run: grep -q "supabase.co" build/web/env.js

      - name: Add SPA fallback
        run: cp build/web/index.html build/web/404.html

      - name: Stamp cache bust on env.js
        run: |
          VERSION=$(date +%s)
          sed -i "s|env.js|env.js?v=${VERSION}|g" build/web/index.html build/web/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
