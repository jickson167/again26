<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>키포지션 생성기</title>
<style>
body{font-family:Arial,"Noto Sans KR",sans-serif;background:#111827;color:#e5e7eb;padding:24px;margin:0}
.wrap{max-width:1200px;margin:auto}.card{background:#1f2937;border:1px solid #374151;border-radius:14px;padding:16px;margin:12px 0}
input,select,textarea{width:100%;box-sizing:border-box;background:#0b1220;color:#e5e7eb;border:1px solid #475569;border-radius:8px;padding:9px;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}button{background:#2563eb;color:white;border:0;border-radius:10px;padding:11px 15px;font-weight:bold;margin-right:8px}
textarea{height:130px;font-family:Consolas,monospace}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #374151;padding:8px;text-align:left}
.badge{display:inline-block;background:#0f172a;border:1px solid #334155;border-radius:999px;padding:4px 10px;margin:2px;cursor:pointer}.small{color:#94a3b8;font-size:12px}
.rec{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.recitem{background:#0b1220;border:1px solid #334155;border-radius:10px;padding:10px}.bar{height:8px;background:#334155;border-radius:99px;overflow:hidden}.fill{height:100%;background:#22c55e}
@media(max-width:900px){.grid,.rec{grid-template-columns:repeat(2,1fr)}}
</style></head><body><div class="wrap">
<h1>키포지션 생성기</h1><p>키포지션은 선수 추천 계산의 기준점이다.</p>
<div class="card"><div class="grid">
<div><label>ID</label><input id="id" value="kp_new_role"></div><div><label>이름</label><input id="name" value="새 키포지션"></div>
<div><label>심플 포지션</label><select id="simple"><option>fw</option><option>mf</option><option>df</option><option>gk</option></select></div>
<div><label>주능력</label><select id="main"><option>speed</option><option>technique</option><option>power</option><option>shooting</option><option>passing</option><option>defense</option><option>stamina</option><option>goalkeeper</option></select></div>
<div><label>보조능력</label><select id="sub"><option>technique</option><option>speed</option><option>power</option><option>shooting</option><option>passing</option><option>defense</option><option>stamina</option><option>goalkeeper</option></select></div>
<div><label>멘탈</label><select id="mental"><option>intelligence</option><option>sense</option></select></div><div><label>팀성향</label><select id="team"><option>organization</option><option>individual</option></select></div>
<div><label>설명</label><input id="desc" value="역할 설명"></div></div><br><button onclick="gen()">CSV 한 줄 생성</button></div>
<div class="card"><textarea id="out" readonly></textarea></div><div class="card"><h3>기본 키포지션</h3><table id="tbl"></table></div>
</div><script>
const data=[{"id": "kp_poacher", "name": "포처", "simple": "fw", "main": "shooting", "sub": "speed", "mental": "sense", "team": "individual", "desc": "수비 뒷공간을 파고드는 마무리형 공격수"}, {"id": "kp_target_forward", "name": "타겟 포워드", "simple": "fw", "main": "power", "sub": "shooting", "mental": "sense", "team": "organization", "desc": "몸싸움과 제공권으로 공격의 기준점이 되는 공격수"}, {"id": "kp_false_nine", "name": "펄스 나인", "simple": "fw", "main": "technique", "sub": "passing", "mental": "intelligence", "team": "organization", "desc": "전방에서 내려와 패스와 연계로 공간을 만드는 공격수"}, {"id": "kp_wing_forward_l", "name": "왼쪽 윙포워드", "simple": "fw", "main": "speed", "sub": "technique", "mental": "sense", "team": "individual", "desc": "측면 돌파와 컷인 슈팅에 강한 공격수"}, {"id": "kp_wing_forward_r", "name": "오른쪽 윙포워드", "simple": "fw", "main": "speed", "sub": "technique", "mental": "sense", "team": "individual", "desc": "오른쪽 측면에서 돌파와 찬스메이킹을 담당"}, {"id": "kp_playmaker", "name": "플레이메이커", "simple": "mf", "main": "technique", "sub": "passing", "mental": "intelligence", "team": "organization", "desc": "중앙에서 패스와 템포를 조율하는 미드필더"}, {"id": "kp_trequartista", "name": "트레콰르티스타", "simple": "mf", "main": "technique", "sub": "shooting", "mental": "sense", "team": "individual", "desc": "공격수와 미드필더 사이에서 결정적 장면을 만드는 선수"}, {"id": "kp_box_to_box", "name": "박스 투 박스", "simple": "mf", "main": "stamina", "sub": "power", "mental": "intelligence", "team": "organization", "desc": "공수 양면을 왕복하며 압박과 전개를 담당"}, {"id": "kp_anchor", "name": "앵커맨", "simple": "mf", "main": "defense", "sub": "power", "mental": "intelligence", "team": "organization", "desc": "수비라인 앞에서 위험 지역을 차단하는 미드필더"}, {"id": "kp_wingback_l", "name": "왼쪽 윙백", "simple": "df", "main": "stamina", "sub": "speed", "mental": "intelligence", "team": "organization", "desc": "측면 전진과 수비 복귀를 모두 수행"}, {"id": "kp_wingback_r", "name": "오른쪽 윙백", "simple": "df", "main": "stamina", "sub": "speed", "mental": "intelligence", "team": "organization", "desc": "오른쪽 측면 왕복과 크로스를 담당"}, {"id": "kp_center_back", "name": "센터백", "simple": "df", "main": "defense", "sub": "power", "mental": "intelligence", "team": "organization", "desc": "수비의 중심에서 라인을 지휘하고 경합을 이김"}, {"id": "kp_sweeper", "name": "스위퍼", "simple": "df", "main": "defense", "sub": "technique", "mental": "intelligence", "team": "organization", "desc": "수비 뒷공간을 커버하고 빌드업에 관여"}, {"id": "kp_ball_playing_cb", "name": "빌드업 센터백", "simple": "df", "main": "defense", "sub": "passing", "mental": "intelligence", "team": "organization", "desc": "후방에서 정확한 패스로 공격을 시작"}, {"id": "kp_sweeper_keeper", "name": "스위퍼 키퍼", "simple": "gk", "main": "goalkeeper", "sub": "passing", "mental": "intelligence", "team": "organization", "desc": "골문 수비와 후방 빌드업을 함께 담당"}, {"id": "kp_shot_stopper", "name": "슈팅 스토퍼", "simple": "gk", "main": "goalkeeper", "sub": "power", "mental": "sense", "team": "individual", "desc": "반사신경과 선방 능력에 특화된 골키퍼"}];
function esc(v){v=String(v??'');return /[,\"\n]/.test(v)?'"'+v.replaceAll('"','""')+'"':v}
function gen(){out.value=[id.value,name.value,simple.value,main.value,sub.value,mental.value,team.value,desc.value].map(esc).join(',')}
tbl.innerHTML='<tr><th>ID</th><th>이름</th><th>포지션</th><th>주/보조</th><th>성향</th></tr>'+data.map(k=>`<tr><td>${k.id}</td><td>${k.name}</td><td>${k.simple}</td><td>${k.main}/${k.sub}</td><td>${k.mental}/${k.team}</td></tr>`).join('');
</script></body></html>
