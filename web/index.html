<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="again26">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>again26</title>
  <link rel="manifest" href="manifest.json">
  <script>
    // GitHub Pages PWA 캐시 문제용. 로컬(localhost) 첫 로드는 건드리지 않는다.
    (function () {
      var host = location.hostname;
      var isLocal = host === 'localhost' || host === '127.0.0.1';
      if (isLocal) return;

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          registrations.forEach(function (registration) {
            registration.unregister();
          });
        });
      }
      if ('caches' in window) {
        caches.keys().then(function (names) {
          names.forEach(function (name) {
            caches.delete(name);
          });
        });
      }
    })();
  </script>
  <script src="env.js"></script>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background-color: #0b1a12;
      background-image: url('background.png');
      background-position: center center;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    #again26-boot {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f6f4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1b5e20;
    }
    #again26-boot .panel {
      text-align: center;
      padding: 24px 32px;
    }
    #again26-boot .title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 8px;
    }
    #again26-boot .hint {
      margin: 0;
      color: #555;
      font-size: 14px;
    }
    #again26-boot .error {
      display: none;
      margin-top: 12px;
      color: #b00020;
      font-size: 13px;
      max-width: 420px;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div id="again26-boot">
    <div class="panel">
      <p class="title">Again26</p>
      <p class="hint">불러오는 중… (최초 실행은 20~30초 걸릴 수 있습니다)</p>
      <p id="again26-boot-error" class="error"></p>
    </div>
  </div>
  <script>
    window.addEventListener('error', function (event) {
      var el = document.getElementById('again26-boot-error');
      if (!el) return;
      el.style.display = 'block';
      el.textContent = '로드 오류: ' + (event.message || '알 수 없음') + ' — 새로고침(Cmd+Shift+R) 해보세요.';
    });

    function removeBootOverlay() {
      var boot = document.getElementById('again26-boot');
      if (boot) boot.remove();
    }

    window.addEventListener('flutter-first-frame', function () {
      sessionStorage.removeItem('again26_boot_reload');
      removeBootOverlay();
    });

    // web-server 디버그 모드: 첫 접속이 컴파일 트리거인데 실패하는 경우가 있어 1회 자동 새로고침
    setTimeout(function () {
      var boot = document.getElementById('again26-boot');
      if (!boot) return;
      if (!sessionStorage.getItem('again26_boot_reload')) {
        sessionStorage.setItem('again26_boot_reload', '1');
        location.reload();
        return;
      }
      var err = document.getElementById('again26-boot-error');
      if (err) {
        err.style.display = 'block';
        err.textContent = '로드가 지연되고 있습니다. 새로고침(Cmd+Shift+R) 해보세요.';
      }
    }, 12000);
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
