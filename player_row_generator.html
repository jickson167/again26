<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>축구 매니저 선수 CSV 한줄 생성기</title>
<style>
body{font-family:Arial,"Noto Sans KR",sans-serif;background:#111827;color:#e5e7eb;margin:0;padding:24px}
.wrap{max-width:1100px;margin:auto}
h1{font-size:24px;margin:0 0 8px}
p{color:#a7b0c0}
.card{background:#1f2937;border:1px solid #374151;border-radius:14px;padding:18px;margin:14px 0}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
label{font-size:12px;color:#cbd5e1}
input,select,textarea{width:100%;box-sizing:border-box;background:#0b1220;color:#e5e7eb;border:1px solid #475569;border-radius:8px;padding:10px;margin-top:5px}
textarea{height:120px;font-family:Consolas,monospace}
button{background:#2563eb;color:white;border:0;border-radius:10px;padding:12px 16px;font-weight:700;cursor:pointer;margin-right:8px}
button.secondary{background:#374151}
.badge{display:inline-block;background:#0f172a;border:1px solid #334155;border-radius:999px;padding:4px 10px;margin:2px;color:#cbd5e1}
.small{font-size:12px;color:#94a3b8}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
<h1>축구 매니저 선수 CSV 한줄 생성기</h1>
<p>이름만 넣고 생성하면 스프레드시트에 붙여넣을 CSV 한 줄을 만든다. 모르면 이름만 넣어도 되고, 포지션/랭크를 넣으면 더 정확해진다.</p>

<div class="card">
<div class="grid">
<div><label>실명</label><input id="name" placeholder="예: 손흥민"/></div>
<div><label>가명</label><input id="fake" placeholder="비워두면 자동 생성"/></div>
<div><label>포지션</label>
<select id="position">
<option>LW/ST</option><option>ST</option><option>RW/LW</option><option>AM/RW</option><option>CM/DM</option><option>CM</option><option>DM/CM</option><option>CB</option><option>LB</option><option>RB</option><option>GK</option>
</select></div>
<div><label>랭크</label><select id="rank"><option>3</option><option>1</option><option>2</option><option>4</option><option>5</option></select></div>
<div><label>현재 기수 age_stage</label><select id="age"><option>1</option><option>2</option><option>3</option></select></div>
<div><label>키</label><input id="height" value="180"/></div>
<div><label>몸무게</label><input id="weight" value="75"/></div>
<div><label>국적</label><input id="nation" value="대한민국"/></div>
<div><label>스피드 0~100</label><input id="speed" value="75"/></div>
<div><label>파워 0~100</label><input id="power" value="70"/></div>
<div><label>기술 0~100</label><input id="tech" value="75"/></div>
<div><label>PK/FK/CK</label><input id="setpiece" value="5,5,5"/></div>
<div><label>리더십 1~10</label><input id="leadership" value="5"/></div>
<div><label>지성↔감각 0~100</label><input id="intel" value="60"/></div>
<div><label>개인↔조직 0~100</label><input id="org" value="55"/></div>
<div><label>portrait_url</label><input id="portrait" placeholder="비워도 됨"/></div>
</div>
<br/>
<button onclick="generate()">CSV 한 줄 생성</button>
<button class="secondary" onclick="copyOut()">복사</button>
<button class="secondary" onclick="fillPreset()">이름으로 프리셋 찾기</button>
</div>

<div class="card">
<div class="small">헤더</div>
<textarea id="header" readonly></textarea>
<div class="small">CSV 한 줄</div>
<textarea id="out" readonly></textarea>
</div>

<div class="card">
<div>프리셋 선수</div>
<div id="presets"></div>
</div>
</div>

<script>
const headers = ["id","name","fake_name","position","pos_1","pos_2","pos_3","pos_4","pos_5","pos_6","pos_7","pos_8","pos_9","pos_10","pos_11","pos_12","pos_13","rank","age_stage","height","weight","nationality",
...Array.from({length:10},(_,i)=>[`growth_${i+1}_speed`,`growth_${i+1}_power`,`growth_${i+1}_technique`]).flat(),
"speed","power","technique","pk_ability","fk_ability","ck_ability","leadership","intelligence_sense","individual_organization","portrait_url"];

const presets = {
"손흥민":["손흥만","LW/ST",5,3,183,78,92,78,86,"9,8,5",9,70,45],
"이강인":["이강이","AM/RW",5,2,174,72,75,62,93,"7,9,8",6,78,42],
"김민재":["김민제","CB",5,2,190,88,72,90,70,"4,3,2",8,64,78],
"황희찬":["황희잔","LW/ST",4,2,177,77,86,82,76,"5,4,3",6,56,50],
"조규성":["조규승","ST",4,2,188,82,72,86,70,"7,4,2",7,56,64],
"조현우":["조현후","GK",4,2,189,75,68,70,62,"6,5,3",8,66,55],
"황인범":["황인봄","CM/DM",4,2,177,70,74,72,86,"5,7,6",7,80,72],
"이재성":["이재승","CM/AM",4,3,180,70,72,70,84,"5,6,5",8,82,78],
"백승호":["백승후","DM/CM",3,2,182,72,68,72,78,"5,7,5",6,72,70],
"배준호":["배준우","AM/LW",3,1,180,70,76,60,82,"5,6,5",4,62,48],
"김승규":["김승구","GK",3,1,187,84,63,72,66,"5,4,3",7,72,58],
"송범근":["송범근","GK",2,1,196,90,55,78,55,"4,3,2",5,58,62],
"김문환":["김문완","RB",3,1,173,64,80,62,72,"3,4,5",5,55,64],
"설영우":["설영후","LB/RB",3,1,180,72,78,66,74,"4,5,5",5,59,66],
"오현규":["오현구","ST",3,1,185,83,70,84,66,"6,3,2",5,50,58]
};

function clamp(v,min,max){return Math.max(min,Math.min(max,Number(v)||0))}
function fakeName(name){
 if(presets[name]) return presets[name][0];
 if(name.length>=3) return name.slice(0,-1)+"만";
 return name+"군";
}
function posScores(position){
 let s=Array(13).fill(1); const set=(i,v)=>s[i-1]=Math.max(s[i-1],v); const p=position.toUpperCase();
 if(p.includes("GK")) set(13,7);
 if(p.includes("CB")){[10,11,12].forEach(i=>set(i,6)); set(8,4); set(7,3); set(9,3)}
 if(p.includes("LB")){set(10,7);set(7,6);set(4,4);set(11,4)}
 if(p.includes("RB")){set(12,7);set(9,6);set(6,4);set(11,4)}
 if(p.includes("DM")){set(8,7);set(5,5);set(11,4);set(7,4);set(9,4)}
 if(p.includes("CM")){set(5,7);set(8,6);set(4,5);set(6,5)}
 if(p.includes("AM")){set(5,7);set(2,5);set(4,5);set(6,5)}
 if(p.includes("LW")){set(1,7);set(4,6);set(2,5);set(10,3)}
 if(p.includes("RW")){set(3,7);set(6,6);set(2,5);set(12,3)}
 if(p.includes("ST")||p.includes("CF")){set(2,7);set(1,5);set(3,5);set(5,4)}
 return s;
}
function to10(x){return clamp(Math.round(x/10),1,10)}
function growth(speed,power,tech,age){
 const peak = age<=1?6:age==2?5:4;
 const ps=to10(speed), pp=to10(power), pt=to10(tech);
 let arr=[];
 for(let stage=1; stage<=10; stage++){
  let dist=Math.abs(stage-peak);
  let mult=Math.max(0.45,1-dist*0.10);
  if(stage>=8) mult -= (stage-7)*0.05;
  arr.push(clamp(Math.round(ps*mult),1,10),clamp(Math.round(pp*mult),1,10),clamp(Math.round(pt*mult),1,10));
 }
 return arr;
}
function csvEscape(v){
 v = String(v ?? "");
 if(/[,"\n]/.test(v)) return `"${v.replaceAll('"','""')}"`;
 return v;
}
function fillPreset(){
 const name=document.getElementById("name").value.trim();
 if(!presets[name]) return alert("프리셋 없음. 그래도 생성은 가능함.");
 const p=presets[name];
 document.getElementById("fake").value=p[0];
 document.getElementById("position").value=p[1];
 document.getElementById("rank").value=p[2];
 document.getElementById("age").value=p[3];
 document.getElementById("height").value=p[4];
 document.getElementById("weight").value=p[5];
 document.getElementById("speed").value=p[6];
 document.getElementById("power").value=p[7];
 document.getElementById("tech").value=p[8];
 document.getElementById("setpiece").value=p[9];
 document.getElementById("leadership").value=p[10];
 document.getElementById("intel").value=p[11];
 document.getElementById("org").value=p[12];
}
function generate(){
 const name=document.getElementById("name").value.trim();
 if(!name) return alert("이름 입력");
 if(presets[name] && !document.getElementById("fake").value.trim()) fillPreset();
 const fake=document.getElementById("fake").value.trim() || fakeName(name);
 const position=document.getElementById("position").value;
 const rank=clamp(document.getElementById("rank").value,1,5);
 const age=clamp(document.getElementById("age").value,1,10);
 const height=clamp(document.getElementById("height").value,150,220);
 const weight=clamp(document.getElementById("weight").value,45,120);
 const nation=document.getElementById("nation").value.trim()||"대한민국";
 const speed=clamp(document.getElementById("speed").value,1,100);
 const power=clamp(document.getElementById("power").value,1,100);
 const tech=clamp(document.getElementById("tech").value,1,100);
 const sp=document.getElementById("setpiece").value.split(",").map(x=>clamp(x.trim(),1,10));
 const leadership=clamp(document.getElementById("leadership").value,1,10);
 const intel=clamp(document.getElementById("intel").value,0,100);
 const org=clamp(document.getElementById("org").value,0,100);
 const portrait=document.getElementById("portrait").value.trim();
 const row=[Date.now(),name,fake,position,...posScores(position),rank,age,height,weight,nation,...growth(speed,power,tech,age),speed,power,tech,sp[0]||5,sp[1]||5,sp[2]||5,leadership,intel,org,portrait];
 document.getElementById("out").value=row.map(csvEscape).join(",");
}
function copyOut(){navigator.clipboard.writeText(document.getElementById("out").value); alert("복사됨");}
document.getElementById("header").value=headers.join(",");
document.getElementById("presets").innerHTML=Object.keys(presets).map(n=>`<span class="badge" onclick="document.getElementById('name').value='${n}';fillPreset();generate();">${n}</span>`).join("");
</script>
</body>
</html>
